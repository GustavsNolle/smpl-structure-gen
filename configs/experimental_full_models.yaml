# Experimental full model benchmark configuration
# Run all models across multiple MoleculeNet datasets

data:
  dataset_name: "bbbp"
  task_type: "classification"
  num_tasks: 1
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  num_workers: 0
  split_type: "scaffold"
  frac_train: 0.8
  frac_val: 0.1
  frac_test: 0.1

model:
  name: "gcn"

  gcn:
    hidden_dim: 128
    num_gnn_layers: 4
    decoder_hidden_dim: 64
    dropout: 0.2

  gat:
    hidden_dim: 32
    num_gnn_layers: 3
    heads: 4
    decoder_hidden_dim: 64
    dropout: 0.2

  egnn:
    hidden_dim: 128
    num_gnn_layers: 4
    decoder_hidden_dim: 64
    dropout: 0.2

  gine:
    hidden_dim: 128
    num_gnn_layers: 4
    decoder_hidden_dim: 64
    dropout: 0.2

  rgcn:
    hidden_dim: 128
    num_gnn_layers: 4
    num_relations: 4
    decoder_hidden_dim: 64
    dropout: 0.2

  mlp:
    hidden_dims: [128, 64, 32]
    dropout: 0.2

  xgboost:
    n_estimators: 1000
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 50

  lightgbm:
    n_estimators: 1000
    max_depth: 6
    learning_rate: 0.05
    num_leaves: 31

  gae:
    latent_dim: 32
    epochs: 100

training:
  seed: 42
  max_epochs: 200
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler:
    name: "reduce_on_plateau"
    patience: 10
    factor: 0.5
  early_stopping:
    monitor: "val_loss"
    patience: 20
    mode: "min"

logging:
  project_name: "mol-prop-gnn"
  save_dir: "lightning_logs"
  log_every_n_steps: 1
